<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Veer Pratap Developer Identity Card</title>
  <desc id="desc">Animated developer identity card for Veer Pratap.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617">
        <animate attributeName="stop-color" values="#020617;#0F172A;#020617" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="32%" stop-color="#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1D4ED8;#0F172A" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="68%" stop-color="#1D4ED8">
        <animate attributeName="stop-color" values="#1D4ED8;#7C3AED;#1D4ED8" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#22C55E">
        <animate attributeName="stop-color" values="#22C55E;#14B8A6;#22C55E" dur="12s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="stroke" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="48%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .title { font: 900 62px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; letter-spacing: 1.8px; }
      .sub { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #DDEBFF; }
      .mono { font: 600 18px 'JetBrains Mono', Consolas, monospace; fill: #E2E8F0; }
      .chip { font: 900 15px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .grid { opacity: 0.12; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="42" fill="url(#bg)" />
  <rect x="16" y="16" width="1168" height="488" rx="34" stroke="url(#stroke)" stroke-width="3" opacity="0.95" />

  <g class="grid">
    <path d="M0 80H1200M0 160H1200M0 240H1200M0 320H1200M0 400H1200M0 480H1200" stroke="#FFFFFF" />
    <path d="M100 0V520M200 0V520M300 0V520M400 0V520M500 0V520M600 0V520M700 0V520M800 0V520M900 0V520M1000 0V520M1100 0V520" stroke="#FFFFFF" />
  </g>

  <circle cx="1020" cy="110" r="86" fill="#22C55E" opacity="0.18">
    <animate attributeName="r" values="86;98;86" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.12;0.26;0.12" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1015" cy="405" r="104" fill="#38BDF8" opacity="0.14">
    <animate attributeName="r" values="104;116;104" dur="5.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.10;0.24;0.10" dur="5.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="140" cy="420" r="95" fill="#A855F7" opacity="0.16">
    <animate attributeName="r" values="95;107;95" dur="6.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.10;0.24;0.10" dur="6.2s" repeatCount="indefinite" />
  </circle>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="6s" repeatCount="indefinite" />
    <rect x="70" y="76" width="570" height="315" rx="30" fill="#020617" opacity="0.78" stroke="#22C55E" />
    <text x="116" y="152" class="title" opacity="0">
      VEER PRATAP
      <animate attributeName="opacity" values="0;1;1" dur="1.8s" fill="freeze" />
      <animate attributeName="y" values="164;152;152" dur="1.8s" fill="freeze" />
    </text>
    <text x="120" y="198" class="sub" opacity="0">
      Vibe Coder • UI-Focused Full-Stack Builder
      <animate attributeName="opacity" values="0;1;1" dur="2.2s" fill="freeze" />
      <animate attributeName="y" values="210;198;198" dur="2.2s" fill="freeze" />
    </text>
    <text x="120" y="258" class="mono" opacity="0">
      ▸ Builds: developer tools, dashboards, web apps
      <animate attributeName="opacity" values="0;1;1" dur="2.6s" fill="freeze" />
    </text>
    <text x="120" y="296" class="mono" opacity="0">
      ▸ Stack: React, Vite, Tailwind, Node, PostgreSQL
      <animate attributeName="opacity" values="0;1;1" dur="3s" fill="freeze" />
    </text>
    <text x="120" y="334" class="mono" opacity="0">
      ▸ Standard: useful first, beautiful always
      <animate attributeName="opacity" values="0;1;1" dur="3.4s" fill="freeze" />
    </text>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="5s" repeatCount="indefinite" />
    <rect x="700" y="86" width="405" height="302" rx="26" fill="#020617" opacity="0.84" stroke="#38BDF8" />
    <circle cx="732" cy="120" r="8" fill="#EF4444" />
    <circle cx="762" cy="120" r="8" fill="#FACC15" />
    <circle cx="792" cy="120" r="8" fill="#22C55E" />
    <text x="732" y="169" class="mono">const profile = {</text>
    <text x="760" y="207" class="mono">username: "ProCodesWithPratap",</text>
    <text x="760" y="245" class="mono">mode: "Build → Ship → Improve",</text>
    <text x="760" y="283" class="mono">featured: "Dev Profile Studio",</text>
    <text x="760" y="321" class="mono">status: "Leveling Up"</text>
    <text x="732" y="356" class="mono">}<tspan>_<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" /></tspan></text>
    <rect x="760" y="370" width="280" height="10" rx="5" fill="#0F172A" />
    <rect x="760" y="370" width="80" height="10" rx="5" fill="#22C55E">
      <animate attributeName="width" values="40;280;40" dur="3.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <g filter="url(#glow)">
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="3.8s" repeatCount="indefinite" /><rect x="80" y="430" width="120" height="40" rx="20" fill="#22C55E" opacity="0.92" /><text x="120" y="456" class="chip">React</text></g>
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="4.2s" repeatCount="indefinite" /><rect x="218" y="430" width="112" height="40" rx="20" fill="#2563EB" opacity="0.92" /><text x="253" y="456" class="chip">Vite</text></g>
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4.6s" repeatCount="indefinite" /><rect x="348" y="430" width="136" height="40" rx="20" fill="#7C3AED" opacity="0.92" /><text x="385" y="456" class="chip">Tailwind</text></g>
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="4s" repeatCount="indefinite" /><rect x="502" y="430" width="120" height="40" rx="20" fill="#0EA5E9" opacity="0.92" /><text x="541" y="456" class="chip">Node</text></g>
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4.4s" repeatCount="indefinite" /><rect x="640" y="430" width="148" height="40" rx="20" fill="#16A34A" opacity="0.92" /><text x="673" y="456" class="chip">PostgreSQL</text></g>
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="4.8s" repeatCount="indefinite" /><rect x="806" y="430" width="140" height="40" rx="20" fill="#A855F7" opacity="0.92" /><text x="839" y="456" class="chip">Python</text></g>
    <g><animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="3.9s" repeatCount="indefinite" /><rect x="964" y="430" width="154" height="40" rx="20" fill="#F59E0B" opacity="0.94" /><text x="1000" y="456" class="chip">Ship Mode</text></g>
  </g>
</svg>
