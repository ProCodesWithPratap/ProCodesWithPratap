<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.35" stop-color="#0f172a"/>
      <stop offset="0.7" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1000" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid { opacity: .18; }
      .title { font: 800 46px 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 1px; }
      .sub { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .text { font: 500 17px 'JetBrains Mono', Consolas, monospace; fill: #e2e8f0; }
      .green { fill: #22c55e; }
      .blue { fill: #38bdf8; }
      .purple { fill: #a855f7; }
      .chipText { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .blink { animation: blink 1.1s infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      .float2 { animation: float 5s ease-in-out infinite reverse; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      @keyframes blink { 0%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-14px); } }
      @keyframes pulse { 0%,100% { opacity: .45; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
    </style>
  </defs>

  <rect width="1000" height="420" rx="34" fill="url(#bg)"/>
  <rect x="12" y="12" width="976" height="396" rx="28" stroke="url(#stroke)" stroke-width="3" opacity=".9"/>

  <g class="grid">
    <path d="M0 70H1000M0 140H1000M0 210H1000M0 280H1000M0 350H1000" stroke="#ffffff"/>
    <path d="M100 0V420M200 0V420M300 0V420M400 0V420M500 0V420M600 0V420M700 0V420M800 0V420M900 0V420" stroke="#ffffff"/>
  </g>

  <circle class="pulse" cx="875" cy="95" r="56" fill="#22c55e" opacity=".25"/>
  <circle class="pulse" cx="850" cy="320" r="80" fill="#38bdf8" opacity=".18"/>
  <circle class="pulse" cx="120" cy="330" r="75" fill="#a855f7" opacity=".18"/>

  <g class="float">
    <rect x="610" y="85" width="292" height="210" rx="22" fill="#020617" opacity=".78" stroke="#38bdf8"/>
    <circle cx="638" cy="113" r="7" fill="#ef4444"/>
    <circle cx="662" cy="113" r="7" fill="#facc15"/>
    <circle cx="686" cy="113" r="7" fill="#22c55e"/>
    <text x="635" y="155" class="text"><tspan class="green">const</tspan> project = {</text>
    <text x="657" y="188" class="text">name: <tspan class="blue">"Obstacle Developer"</tspan>,</text>
    <text x="657" y="221" class="text">stack: <tspan class="purple">"Full Stack"</tspan>,</text>
    <text x="657" y="254" class="text">status: <tspan class="green">"Building"</tspan></text>
    <text x="635" y="287" class="text">}<tspan class="blink">_</tspan></text>
  </g>

  <g class="float2">
    <rect x="82" y="78" width="460" height="250" rx="26" fill="#020617" opacity=".72" stroke="#22c55e"/>
    <text x="120" y="145" class="title">VEER PRATAP</text>
    <text x="122" y="185" class="sub">Full-Stack Developer • AI-Powered Builder</text>
    <text x="122" y="232" class="text"><tspan class="green">▸</tspan> React 19 + Vite + Tailwind CSS</text>
    <text x="122" y="266" class="text"><tspan class="blue">▸</tspan> Express + TypeScript + Prisma</text>
    <text x="122" y="300" class="text"><tspan class="purple">▸</tspan> Building real products with consistency</text>
  </g>

  <g filter="url(#glow)">
    <rect x="110" y="350" width="145" height="36" rx="18" fill="#22c55e" opacity=".88"/>
    <text x="137" y="374" class="chipText">React</text>
    <rect x="275" y="350" width="145" height="36" rx="18" fill="#2563eb" opacity=".88"/>
    <text x="304" y="374" class="chipText">TypeScript</text>
    <rect x="440" y="350" width="145" height="36" rx="18" fill="#7c3aed" opacity=".88"/>
    <text x="481" y="374" class="chipText">Prisma</text>
    <rect x="605" y="350" width="145" height="36" rx="18" fill="#0ea5e9" opacity=".88"/>
    <text x="642" y="374" class="chipText">Vercel</text>
    <rect x="770" y="350" width="145" height="36" rx="18" fill="#16a34a" opacity=".88"/>
    <text x="812" y="374" class="chipText">GitHub</text>
  </g>
</svg>
