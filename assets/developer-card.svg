<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.30" stop-color="#0f172a"/>
      <stop offset="0.62" stop-color="#1d4ed8"/>
      <stop offset="0.82" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1000" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="0.45" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid { opacity: .16; }
      .title { font: 900 48px 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 1.5px; }
      .sub { font: 650 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .text { font: 500 16px 'JetBrains Mono', Consolas, monospace; fill: #e2e8f0; }
      .small { font: 700 13px 'JetBrains Mono', Consolas, monospace; fill: #dbeafe; }
      .green { fill: #22c55e; }
      .blue { fill: #38bdf8; }
      .purple { fill: #a855f7; }
      .yellow { fill: #facc15; }
      .chipText { font: 800 13px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .blink { animation: blink 1.1s infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      .float2 { animation: float 5s ease-in-out infinite reverse; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      @keyframes blink { 0%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-14px); } }
      @keyframes pulse { 0%,100% { opacity: .42; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
    </style>
  </defs>

  <rect width="1000" height="420" rx="34" fill="url(#bg)"/>
  <rect x="12" y="12" width="976" height="396" rx="28" stroke="url(#stroke)" stroke-width="3" opacity=".9"/>

  <g class="grid">
    <path d="M0 70H1000M0 140H1000M0 210H1000M0 280H1000M0 350H1000" stroke="#ffffff"/>
    <path d="M100 0V420M200 0V420M300 0V420M400 0V420M500 0V420M600 0V420M700 0V420M800 0V420M900 0V420" stroke="#ffffff"/>
  </g>

  <circle class="pulse" cx="875" cy="95" r="56" fill="#22c55e" opacity=".25"/>
  <circle class="pulse" cx="850" cy="320" r="80" fill="#38bdf8" opacity=".18"/>
  <circle class="pulse" cx="120" cy="330" r="75" fill="#a855f7" opacity=".18"/>

  <g class="float">
    <rect x="598" y="76" width="318" height="228" rx="22" fill="#020617" opacity=".80" stroke="#38bdf8"/>
    <circle cx="628" cy="105" r="7" fill="#ef4444"/>
    <circle cx="652" cy="105" r="7" fill="#facc15"/>
    <circle cx="676" cy="105" r="7" fill="#22c55e"/>
    <text x="625" y="145" class="text"><tspan class="green">const</tspan> lab = {</text>
    <text x="647" y="176" class="text">type: <tspan class="blue">"Creative Dev Lab"</tspan>,</text>
    <text x="647" y="207" class="text">testProject: <tspan class="purple">"Obstacle.dev"</tspan>,</text>
    <text x="647" y="238" class="text">languages: <tspan class="yellow">"JS TS PY CPP CS"</tspan>,</text>
    <text x="647" y="269" class="text">status: <tspan class="green">"Leveling Up"</tspan></text>
    <text x="625" y="292" class="text">}<tspan class="blink">_</tspan></text>
  </g>

  <g class="float2">
    <rect x="82" y="72" width="470" height="258" rx="26" fill="#020617" opacity=".74" stroke="#22c55e"/>
    <text x="120" y="138" class="title">VEER PRATAP</text>
    <text x="122" y="180" class="sub">Multi-Language Developer • AI-Powered Builder</text>
    <text x="122" y="226" class="text"><tspan class="green">▸</tspan> Frontend: React + Vite + Tailwind</text>
    <text x="122" y="258" class="text"><tspan class="blue">▸</tspan> Backend: Express + Prisma + PostgreSQL</text>
    <text x="122" y="290" class="text"><tspan class="purple">▸</tspan> Languages: Python • C++ • C# • JavaScript</text>
  </g>

  <g filter="url(#glow)">
    <rect x="80" y="350" width="118" height="36" rx="18" fill="#22c55e" opacity=".88"/>
    <text x="118" y="374" class="chipText">React</text>
    <rect x="212" y="350" width="118" height="36" rx="18" fill="#2563eb" opacity=".88"/>
    <text x="241" y="374" class="chipText">Python</text>
    <rect x="344" y="350" width="118" height="36" rx="18" fill="#7c3aed" opacity=".88"/>
    <text x="385" y="374" class="chipText">C++</text>
    <rect x="476" y="350" width="118" height="36" rx="18" fill="#0ea5e9" opacity=".88"/>
    <text x="520" y="374" class="chipText">C#</text>
    <rect x="608" y="350" width="118" height="36" rx="18" fill="#16a34a" opacity=".88"/>
    <text x="641" y="374" class="chipText">Prisma</text>
    <rect x="740" y="350" width="178" height="36" rx="18" fill="#f59e0b" opacity=".90"/>
    <text x="785" y="374" class="chipText">Ship Real Builds</text>
  </g>
</svg>
