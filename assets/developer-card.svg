<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Veer Pratap Developer Identity Card</title>
  <desc id="desc">A premium dark developer card for Veer Pratap, also known as ProCodesWithPratap.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.32" stop-color="#0F172A"/>
      <stop offset="0.62" stop-color="#1D4ED8"/>
      <stop offset="0.82" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.48" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid { opacity: .12; }
      .title { font: 900 62px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; letter-spacing: 1.8px; }
      .sub { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #DDEBFF; }
      .mono { font: 600 18px 'JetBrains Mono', Consolas, monospace; fill: #E2E8F0; }
      .monoSmall { font: 700 14px 'JetBrains Mono', Consolas, monospace; fill: #DDEBFF; }
      .chip { font: 900 15px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .green { fill: #22C55E; }
      .blue { fill: #38BDF8; }
      .purple { fill: #A855F7; }
      .yellow { fill: #FACC15; }
      .float { animation: float 4.8s ease-in-out infinite; }
      .float2 { animation: float 6s ease-in-out infinite reverse; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
      .blink { animation: blink 1.1s infinite; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes pulse { 0%,100% { opacity: .28; transform: scale(1); } 50% { opacity: .82; transform: scale(1.06); } }
      @keyframes blink { 0%,48% { opacity: 1; } 49%,100% { opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="520" rx="42" fill="url(#bg)"/>
  <rect x="16" y="16" width="1168" height="488" rx="34" stroke="url(#line)" stroke-width="3" opacity=".95"/>

  <g class="grid">
    <path d="M0 80H1200M0 160H1200M0 240H1200M0 320H1200M0 400H1200M0 480H1200" stroke="#FFFFFF"/>
    <path d="M100 0V520M200 0V520M300 0V520M400 0V520M500 0V520M600 0V520M700 0V520M800 0V520M900 0V520M1000 0V520M1100 0V520" stroke="#FFFFFF"/>
  </g>

  <circle class="pulse" cx="1020" cy="110" r="86" fill="#22C55E"/>
  <circle class="pulse" cx="1015" cy="405" r="104" fill="#38BDF8"/>
  <circle class="pulse" cx="140" cy="420" r="95" fill="#A855F7"/>

  <g class="float2">
    <rect x="70" y="76" width="570" height="315" rx="30" fill="#020617" opacity=".78" stroke="#22C55E"/>
    <text x="116" y="152" class="title">VEER PRATAP</text>
    <text x="120" y="198" class="sub">Vibe Coder • UI-Focused Full-Stack Builder</text>
    <text x="120" y="258" class="mono"><tspan class="green">▸</tspan> Builds: developer tools, dashboards, web apps</text>
    <text x="120" y="296" class="mono"><tspan class="blue">▸</tspan> Stack: React, Vite, Tailwind, Node, PostgreSQL</text>
    <text x="120" y="334" class="mono"><tspan class="purple">▸</tspan> Standard: useful first, beautiful always</text>
  </g>

  <g class="float">
    <rect x="700" y="86" width="405" height="302" rx="26" fill="#020617" opacity=".84" stroke="#38BDF8"/>
    <circle cx="732" cy="120" r="8" fill="#EF4444"/>
    <circle cx="762" cy="120" r="8" fill="#FACC15"/>
    <circle cx="792" cy="120" r="8" fill="#22C55E"/>
    <text x="732" y="169" class="mono"><tspan class="green">const</tspan> profile = {</text>
    <text x="760" y="207" class="mono">username: <tspan class="blue">"ProCodesWithPratap"</tspan>,</text>
    <text x="760" y="245" class="mono">mode: <tspan class="purple">"Build → Ship → Improve"</tspan>,</text>
    <text x="760" y="283" class="mono">featured: <tspan class="yellow">"Dev Profile Studio"</tspan>,</text>
    <text x="760" y="321" class="mono">status: <tspan class="green">"Leveling Up"</tspan></text>
    <text x="732" y="356" class="mono">}<tspan class="blink">_</tspan></text>
  </g>

  <g filter="url(#glow)">
    <rect x="80" y="430" width="120" height="40" rx="20" fill="#22C55E" opacity=".92"/>
    <text x="120" y="456" class="chip">React</text>
    <rect x="218" y="430" width="112" height="40" rx="20" fill="#2563EB" opacity=".92"/>
    <text x="253" y="456" class="chip">Vite</text>
    <rect x="348" y="430" width="136" height="40" rx="20" fill="#7C3AED" opacity=".92"/>
    <text x="385" y="456" class="chip">Tailwind</text>
    <rect x="502" y="430" width="120" height="40" rx="20" fill="#0EA5E9" opacity=".92"/>
    <text x="541" y="456" class="chip">Node</text>
    <rect x="640" y="430" width="148" height="40" rx="20" fill="#16A34A" opacity=".92"/>
    <text x="673" y="456" class="chip">PostgreSQL</text>
    <rect x="806" y="430" width="140" height="40" rx="20" fill="#A855F7" opacity=".92"/>
    <text x="839" y="456" class="chip">Python</text>
    <rect x="964" y="430" width="154" height="40" rx="20" fill="#F59E0B" opacity=".94"/>
    <text x="1000" y="456" class="chip">Ship Mode</text>
  </g>
</svg>
