<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Veer Pratap GitHub Hero Banner</title>
  <desc id="desc">Animated hero banner for Veer Pratap, ProCodesWithPratap.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617">
        <animate attributeName="stop-color" values="#020617;#0F172A;#020617" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="35%" stop-color="#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E3A8A;#0F172A" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="70%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#7C3AED;#2563EB" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#22C55E">
        <animate attributeName="stop-color" values="#22C55E;#14B8A6;#22C55E" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="stroke" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="50%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .name { font: 900 72px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; letter-spacing: 2px; }
      .tagline { font: 800 26px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .subline { font: 700 18px 'JetBrains Mono', Consolas, monospace; fill: #DCFCE7; }
      .chip { font: 900 14px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .grid { opacity: 0.12; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="38" fill="url(#bg)" />
  <rect x="14" y="14" width="1172" height="332" rx="30" stroke="url(#stroke)" stroke-width="3" opacity="0.96" />

  <g class="grid">
    <path d="M0 72H1200M0 144H1200M0 216H1200M0 288H1200" stroke="#FFFFFF" />
    <path d="M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360" stroke="#FFFFFF" />
  </g>

  <circle cx="1000" cy="90" r="78" fill="#22C55E" opacity="0.22">
    <animate attributeName="r" values="78;90;78" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.18;0.34;0.18" dur="4s" repeatCount="indefinite" />
  </circle>

  <circle cx="1090" cy="285" r="96" fill="#38BDF8" opacity="0.16">
    <animate attributeName="r" values="96;108;96" dur="5.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.14;0.28;0.14" dur="5.2s" repeatCount="indefinite" />
  </circle>

  <circle cx="120" cy="292" r="86" fill="#A855F7" opacity="0.18">
    <animate attributeName="r" values="86;98;86" dur="4.6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.14;0.30;0.14" dur="4.6s" repeatCount="indefinite" />
  </circle>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="5s" repeatCount="indefinite" />
    <rect x="78" y="72" width="780" height="182" rx="28" fill="#020617" opacity="0.74" stroke="#38BDF8" />
    <text x="120" y="145" class="name" opacity="0">
      VEER PRATAP
      <animate attributeName="opacity" values="0;1;1" dur="2s" repeatCount="1" fill="freeze" />
      <animate attributeName="y" values="155;145;145" dur="2s" repeatCount="1" fill="freeze" />
    </text>
    <text x="124" y="190" class="tagline" opacity="0">
      Vibe Coder • UI-Focused Full-Stack Builder
      <animate attributeName="opacity" values="0;1;1" dur="2.5s" repeatCount="1" fill="freeze" />
      <animate attributeName="y" values="200;190;190" dur="2.5s" repeatCount="1" fill="freeze" />
    </text>
    <text x="126" y="231" class="subline" opacity="0">
      ProCodesWithPratap // building clean web products with taste and discipline
      <animate attributeName="opacity" values="0;1;1" dur="3s" repeatCount="1" fill="freeze" />
      <animate attributeName="y" values="241;231;231" dur="3s" repeatCount="1" fill="freeze" />
    </text>
  </g>

  <g filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="3.4s" repeatCount="indefinite" />
      <rect x="120" y="282" width="116" height="38" rx="19" fill="#22C55E" opacity="0.96" />
      <text x="158" y="307" class="chip">React</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="3.8s" repeatCount="indefinite" />
      <rect x="252" y="282" width="104" height="38" rx="19" fill="#2563EB" opacity="0.96" />
      <text x="286" y="307" class="chip">Vite</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="4.1s" repeatCount="indefinite" />
      <rect x="372" y="282" width="132" height="38" rx="19" fill="#7C3AED" opacity="0.96" />
      <text x="408" y="307" class="chip">Tailwind</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="3.6s" repeatCount="indefinite" />
      <rect x="520" y="282" width="112" height="38" rx="19" fill="#0EA5E9" opacity="0.96" />
      <text x="556" y="307" class="chip">Node</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4.4s" repeatCount="indefinite" />
      <rect x="648" y="282" width="152" height="38" rx="19" fill="#16A34A" opacity="0.96" />
      <text x="681" y="307" class="chip">PostgreSQL</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="3.9s" repeatCount="indefinite" />
      <rect x="816" y="282" width="156" height="38" rx="19" fill="#F59E0B" opacity="0.97" />
      <text x="851" y="307" class="chip">Ship Mode</text>
    </g>
  </g>
</svg>
